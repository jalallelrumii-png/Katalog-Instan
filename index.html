<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>KatalogInstan - Katalog UMKM</title>
    <meta name="description" content="Katalog produk UMKM dengan checkout via WhatsApp">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8fafc">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        .product-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .product-card:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
        }
        .fade-img {
            opacity: 0;
            transition: opacity 0.3s ease-in;
        }
        .fade-img.loaded {
            opacity: 1;
        }
        .sheet {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sheet.hidden {
            transform: translateY(100%);
        }
        .overlay {
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

    <header class="sticky top-0 bg-slate-50/80 backdrop-blur-sm z-20 border-b border-slate-200/60">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-2xl font-semibold tracking-tight">KatalogInstan</h1>
            <button id="cartButton" class="relative p-2 rounded-full hover:bg-white/50 transition">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-slate-700">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
                </svg>
                <span id="cartBadge" class="absolute -top-1 -right-1 bg-emerald-600 text-white text-xs font-bold rounded-full min-w-[20px] h-5 flex items-center justify-center px-1 hidden">0</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div id="productGrid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="overlay" class="overlay fixed inset-0 bg-black/40 z-30 opacity-0 pointer-events-none transition-opacity"></div>

    <!-- Bottom Sheet Detail Produk -->
    <div id="detailSheet" class="sheet fixed bottom-0 left-0 right-0 bg-white rounded-t-2xl shadow-2xl z-40 transform translate-y-full">
        <div class="relative p-5 pb-8">
            <div class="absolute top-3 right-3">
                <button id="closeDetail" class="p-2 rounded-full hover:bg-slate-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="w-12 h-1 bg-slate-300 rounded-full mx-auto mb-4"></div>
            <div id="detailContent"></div>
        </div>
    </div>

    <!-- Bottom Sheet Keranjang -->
    <div id="cartSheet" class="sheet fixed bottom-0 left-0 right-0 bg-white rounded-t-2xl shadow-2xl z-40 transform translate-y-full">
        <div class="relative p-5 pb-8 max-h-[80vh] overflow-y-auto">
            <div class="absolute top-3 right-3">
                <button id="closeCart" class="p-2 rounded-full hover:bg-slate-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="w-12 h-1 bg-slate-300 rounded-full mx-auto mb-4"></div>
            <h2 class="text-xl font-semibold mb-4">Keranjang Belanja</h2>
            <div id="cartItems" class="space-y-3"></div>
            <div class="mt-6 pt-4 border-t border-slate-200">
                <div class="flex justify-between font-semibold text-lg">
                    <span>Total</span>
                    <span id="cartTotal">Rp 0</span>
                </div>
                <button id="checkoutBtn" class="w-full mt-4 bg-emerald-600 text-white py-3 rounded-xl font-medium hover:bg-emerald-700 transition shadow-sm">
                    Checkout via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
