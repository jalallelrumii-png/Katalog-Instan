<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - KatalogInstan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .card { @apply bg-white rounded-xl shadow-sm p-6; }
        .btn-primary { @apply bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-emerald-700 transition; }
        .btn-danger { @apply bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition; }
    </style>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Panel Admin Katalog</h1>
            <a href="index.html" target="_blank" class="text-emerald-600 hover:underline">Lihat Katalog →</a>
        </div>

        <!-- Login Section (hidden by default, uncomment if needed) -->
        <div id="loginSection" class="card mb-6 hidden">
            <h2 class="text-xl font-semibold mb-4">Login Admin</h2>
            <input type="password" id="passwordInput" placeholder="Masukkan password" class="w-full border rounded-lg p-2 mb-2">
            <button onclick="checkPassword()" class="btn-primary">Login</button>
        </div>

        <div id="adminPanel">
            <!-- Pengaturan Toko -->
            <div class="card mb-6">
                <h2 class="text-xl font-semibold mb-4">Pengaturan Toko</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Nama Toko</label>
                        <input type="text" id="namaToko" class="w-full border rounded-lg p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Nomor WhatsApp (format: 628...)</label>
                        <input type="text" id="nomorWA" class="w-full border rounded-lg p-2">
                    </div>
                </div>
                <button onclick="simpanSettings()" class="btn-primary mt-4">Simpan Pengaturan</button>
            </div>

            <!-- Daftar Produk -->
            <div class="card">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">Daftar Produk</h2>
                    <button onclick="tambahProduk()" class="btn-primary">+ Tambah Produk</button>
                </div>
                <div id="produkList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- Modal Produk -->
    <div id="modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden">
        <div class="bg-white rounded-xl p-6 max-w-md w-full">
            <h3 id="modalTitle" class="text-xl font-semibold mb-4">Tambah Produk</h3>
            <input type="hidden" id="produkId">
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-medium mb-1">Nama Produk</label>
                    <input type="text" id="namaProduk" class="w-full border rounded-lg p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Harga (Rp)</label>
                    <input type="number" id="hargaProduk" class="w-full border rounded-lg p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Deskripsi</label>
                    <textarea id="deskripsiProduk" rows="3" class="w-full border rounded-lg p-2"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">URL Gambar</label>
                    <input type="url" id="gambarProduk" class="w-full border rounded-lg p-2">
                </div>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="simpanProduk()" class="btn-primary flex-1">Simpan</button>
                <button onclick="tutupModal()" class="bg-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-400 flex-1">Batal</button>
            </div>
        </div>
    </div>

    <script type="import" src="supabase-config.js"></script>
    <script type="module" src="admin.js"></script>
</body>
</html>
